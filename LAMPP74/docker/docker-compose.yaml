version: "3.8"
services:

  lampp74host:
    build: .
    container_name: lampp74host
    ports:
      - ${HOST_PORT}:80
    volumes:
      - ${APP_DIR}:/var/www/html
    depends_on:
      - lampp74db
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.0"
    networks:
      - lampp74-net

  lampp74db:
    image: mysql:5.7
    container_name: lampp74db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      CRON_TIME: "0 1 * * *"
    volumes:
      - ${DB_DIR}:/var/lib/mysql
      - /home/masihgurutkj/database/lampp74:/backup
    ports:
      - ${MYSQL_PORT}:3306
    mem_limit: 1g
    cpus: "1.0"
    networks:
      - lampp74-net

  lampp74phpmyadmin:
    image: phpmyadmin:5.2
    container_name: lampp74phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: lampp74db
    ports:
      - ${PHPMYADMIN_PORT}:80
    networks:
      - lampp74-net

networks:
  lampp74-net:
    driver: bridge
